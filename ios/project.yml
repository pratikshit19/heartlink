name: HeartLink
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "16.0"
targets:
  HeartLink:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: HeartLink
    settings:
      base:
        INFOPLIST_FILE: HeartLink/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeartLink/HeartLink.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.heartlink
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - target: HeartLinkWidget

  HeartLinkWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: HeartLinkWidget
    settings:
      base:
        INFOPLIST_FILE: HeartLinkWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: HeartLinkWidget/HeartLinkWidget.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.heartlink.HeartLinkWidget
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        APPLICATION_EXTENSION_API_ONLY: "NO"
