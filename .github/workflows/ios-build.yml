name: Build iOS App (Cloud Build)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify iOS App
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        working-directory: ios
        run: xcodegen generate --spec project.yml

      - name: List generated project schemes
        working-directory: ios
        run: xcodebuild -project HeartLink.xcodeproj -list

      - name: Build for Simulator (No Code Signing Required)
        working-directory: ios
        run: |
          xcodebuild \
            -project HeartLink.xcodeproj \
            -scheme HeartLink \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build \
            | xcpretty || true
          # xcpretty may not be installed; fallback ensures non-zero exit doesn't mask real errors
          xcodebuild \
            -project HeartLink.xcodeproj \
            -scheme HeartLink \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tail -30
